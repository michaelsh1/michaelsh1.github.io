<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>michaelsh1.github.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #242424;
      --text-primary: #f0ece4;
      --text-secondary: #7a7570;
      --accent: #c8b89a;
      --accent-dim: rgba(200, 184, 154, 0.12);
    }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }
    main {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
    }
    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }
    .wordmark em {
      font-style: italic;
      color: var(--accent);
    }
    .tagline {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s forwards;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }
    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
      gap: 12px;
    }
    .card:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
    }
    .card:hover .arrow {
      transform: translate(3px, -3px);
      color: var(--accent);
    }
    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 3px;
    }
    .card-title {
      font-size: 16px;
      color: var(--text-primary);
      font-weight: 400;
    }
    .arrow {
      font-size: 16px;
      color: var(--border);
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main>
    <div class="wordmark">Inter<em>value</em></div>
    <p class="tagline">Interval timer &amp; calisthenics training for iOS</p>
    <div class="cards">
      <a class="card" href="/intervalue-support">
        <div>
          <div class="card-label">Intervalue</div>
          <div class="card-title">Support</div>
        </div>
        <span class="arrow">→</span>
      </a>
      <a class="card" href="/intervalue-privacy-policy">
        <div>
          <div class="card-label">Intervalue</div>
          <div class="card-title">Privacy Policy</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>
  </main>
</body>
</html>
